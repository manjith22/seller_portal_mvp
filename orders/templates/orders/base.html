<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Portal</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <nav class="nav">
    <div class="brand">Seller Portal</div>
    <div class="nav-links">
      {% if user.is_authenticated %}
        <a href="/">Dashboard</a>
        <a href="/orders/">Orders</a>
        <a href="/orders/new/">New Order</a>
        <a href="/orders/upload/">Bulk Upload</a>
        <a href="/orders/export/">Export</a>
        {% if user.is_staff %}<a href="/admin/">Admin</a>{% endif %}
        <form method="post" action="/accounts/logout/">{% csrf_token %}<button type="submit" class="link-btn">Logout</button></form>
      {% endif %}
    </div>
  </nav>
  <main class="container">
    {% if messages %}
      {% for message in messages %}
        <div class="alert {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
